<app-alert [message]="message_alert" type="error" *ngIf="error"></app-alert>

<a routerLink="/"
class="
  absolute
  top-5
  left-5
  font-bold
  text-xl
  text-gray-800
  no-underline
  hover:text-gray-600
  cursor-pointer
  lex flex-row justify-center items-center
"><span>< </span>Regresar al inicio</a>

<section class="bg-[#F4F7FF] py-20 lg:py-[120px]">
  <div class="container">
    <div class="flex flex-wrap -mx-4">
      <div class="w-full px-4">
        <div class="
              max-w-[525px]
              mx-auto
              text-center
              bg-white
              rounded-lg
              relative
              overflow-hidden
              py-16
              px-10
              sm:px-12
              md:px-[60px]
              ">
          <div class="mb-10 md:mb-16 text-center">
            <a class="inline-block max-w-[160px] mx-auto">
              <h1 class="font-bold text-2xl hover:text-primary cursor-pointer">TESEteca</h1>
            </a>
          </div>
          <form [formGroup]="user" (ngSubmit)="submit()">
            <div class="mb-6">
              <input type="email" placeholder="Introduce tu correo" name="email" formControlName="email"
                [ngClass]="{ 'border-red-500 border-2': !user.controls['email'].valid && user.controls['email'].touched || error }"
                autocomplete="false"
                class="
                  w-full
                  rounded-md
                  border
                  bordder-[#E9EDF4]
                  py-3
                  px-5
                  bg-[#FCFDFE]
                  text-base text-body-color
                  placeholder-[#ACB6BE]
                  outline-none
                  focus-visible:shadow-none
                  focus:border-primary
              " />
              <div *ngIf="user.controls['email'].hasError('required') && user.controls['email'].touched"
                class="text-red-500 text-sm pt-2">
                El campo es requerido
              </div>
              <div *ngIf="user.controls['email'].hasError('email') && user.controls['email'].touched"
                class="text-red-500 text-sm pt-2">
                El correo no es válido
              </div>
            </div>
            <div class="mb-6">
              <input type="password" placeholder="Introduce tu contraseña" name="password" formControlName="password"
                [ngClass]="{ 'border-red-500 border-2': !user.controls['password'].valid && user.controls['password'].touched || error }"
                class="
                  w-full
                  rounded-md
                  border
                  bordder-[#E9EDF4]
                  py-3
                  px-5
                  bg-[#FCFDFE]
                  text-base text-body-color
                  placeholder-[#ACB6BE]
                  outline-none
                  focus-visible:shadow-none
                  focus:border-primary
              " />
              <div *ngIf="user.controls['password'].hasError('required') && user.controls['password'].touched"
                class="text-red-500 text-sm pt-2">
                El campo es requerido
              </div>
              <div *ngIf="user.controls['password'].hasError('minlength') && user.controls['password'].touched"
                class="text-red-500 text-sm pt-2">
                La contraseña debe tener al menos 6 caracteres
              </div>
            </div>
            <div class="mb-10">
              <app-loading *ngIf="loading"></app-loading>
              <input type="submit" value="Iniciar sesión" *ngIf="!loading" [disabled]="!user.valid"
                [ngClass]="{'bg-gray-500 cursor-not-allowed hover:bg-gray-500': !user.valid }"
                class="
                  w-full
                  rounded-md
                  border
                  bordder-primary
                  py-3
                  px-5
                  bg-primary
                  text-base text-white
                  cursor-pointer
                  hover:bg-opacity-90
                  transition
              " />
            </div>
          </form>

          <a href="javascript:void(0)" class="
            text-base
            inline-block
            mb-2
            text-[#adadad]
            hover:underline hover:text-primary
          ">
            ¿Olvidaste tu contraseña?
          </a>
          <p class="text-base text-[#adadad]">
            ¿A&uacute;n no tienes una cuenta?
            <a routerLink="/auth/register" class="text-primary hover:underline">
              reg&iacute;strate
            </a>
          </p>
          <div>
            <span class="absolute left-1 bottom-1">
              <svg width="29" height="40" viewBox="0 0 29 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="2.288" cy="25.9912" r="1.39737" transform="rotate(-90 2.288 25.9912)" fill="#3056D3" />
                <circle cx="14.5849" cy="25.9911" r="1.39737" transform="rotate(-90 14.5849 25.9911)" fill="#3056D3" />
                <circle cx="26.7216" cy="25.9911" r="1.39737" transform="rotate(-90 26.7216 25.9911)" fill="#3056D3" />
                <circle cx="2.288" cy="13.6944" r="1.39737" transform="rotate(-90 2.288 13.6944)" fill="#3056D3" />
                <circle cx="14.5849" cy="13.6943" r="1.39737" transform="rotate(-90 14.5849 13.6943)" fill="#3056D3" />
                <circle cx="26.7216" cy="13.6943" r="1.39737" transform="rotate(-90 26.7216 13.6943)" fill="#3056D3" />
                <circle cx="2.288" cy="38.0087" r="1.39737" transform="rotate(-90 2.288 38.0087)" fill="#3056D3" />
                <circle cx="2.288" cy="1.39739" r="1.39737" transform="rotate(-90 2.288 1.39739)" fill="#3056D3" />
                <circle cx="14.5849" cy="38.0089" r="1.39737" transform="rotate(-90 14.5849 38.0089)" fill="#3056D3" />
                <circle cx="26.7216" cy="38.0089" r="1.39737" transform="rotate(-90 26.7216 38.0089)" fill="#3056D3" />
                <circle cx="14.5849" cy="1.39761" r="1.39737" transform="rotate(-90 14.5849 1.39761)" fill="#3056D3" />
                <circle cx="26.7216" cy="1.39761" r="1.39737" transform="rotate(-90 26.7216 1.39761)" fill="#3056D3" />
              </svg>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ====== Blog Section Start -->
<section class="pt-20 pb-10 lg:pb-20">
  <div class="container">
    <div class="flex flex-wrap justify-center -mx-4">
      <div class="w-full px-4">
        <div class="text-center mx-auto mb-[60px] lg:mb-20 max-w-[510px]">
          <h2 class="
            font-bold
            text-3xl
            sm:text-4xl
            md:text-[40px]
            text-dark
            mb-4
          ">
            Reservaciones
          </h2>
          <p class="text-base text-body-color">
            Estas son las reservaciones que has realizado.
          </p>
        </div>
      </div>
    </div>
    <div class="flex flex-wrap -mx-4">
      <div class="w-full md:w-1/2 lg:w-1/3 px-4">
        <div class="max-w-[370px] mx-auto mb-10" *ngFor="let reservation of functions[0]; let i = index">
          <div class="rounded overflow-hidden mb-8">
            <img src="{{ reservation.movie?.poster }}" alt="image"
              class="h-[200px] w-full object-cover" />
          </div>
          <div>
            <span class="
              bg-primary
              rounded
              inline-block
              text-center
              py-1
              px-4
              text-xs
              leading-loose
              font-semibold
              text-white
              mb-5
            ">
              07/07/2022
            </span>
            <h3>
              <a href="javascript:void(0)" class="
                font-semibold
                text-xl
                sm:text-2xl
                lg:text-xl
                xl:text-2xl
                mb-4
                inline-block
                text-dark
                hover:text-primary
              ">
                {{ reservation.movie?.title }}
              </a>
            </h3>
            <p class="text-base text-body-color">
              {{ '100' | currency:'MXN' }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

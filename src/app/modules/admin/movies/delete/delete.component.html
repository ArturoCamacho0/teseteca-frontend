<app-alert [message]="message" [type]="status"></app-alert>

<div x-transition *ngIf="open" class="
  bg-black bg-opacity-90
  fixed
  top-0
  left-0
  w-full
  min-h-screen
  h-full
  flex
  items-center
  justify-center
  px-4
  py-5
">
  <div class="
    w-full
    max-w-[570px]
    rounded-[20px]
    bg-white
    py-12
    px-8
    md:py-[60px] md:px-[70px]
    text-center
  ">
    <h3 class="font-bold text-dark text-xl sm:text-2xl pb-2">
      Eliminar pel&iacute;cula
    </h3>
    <span class="inline-block bg-primary h-1 w-[90px] mx-auto rounded mb-6"></span>
    <p class="text-base text-body-color leading-relaxed mb-10">
      ¿Est&aacute;s segur@ de que quieres eliminar la pel&iacute;cula?
    </p>
    <div class="flex flex-wrap -mx-3">
      <div class="w-1/2 px-3">
        <button (click)="closeModal()"
        class="
          block
          text-center
          w-full
          p-3
          text-base
          font-medium
          rounded-lg
          text-dark
          border border-[#E9EDF9]
          hover:bg-slate-600 hover:text-white hover:border-slate-600
          transition
        ">
          Cancelar
        </button>
      </div>
      <div class="w-1/2 px-3">
        <button (click)="deleteMovie()"
          class="
            block
            text-center
            w-full
            p-3
            text-base
            font-medium
            rounded-lg
            bg-red-600
            text-white
            border border-red-600
            hover:bg-opacity-90
            transition
          ">
          Si, eliminar
        </button>
      </div>
    </div>
  </div>
</div>
